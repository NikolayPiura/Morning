<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>Дашборд эффективности</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* ─── Palette: warm off-white + cobalt ink + electric lime ─── */
  --bg:#f4f3ef;
  --paper:#ffffff;
  --ink:#0e0f12;
  --ink-2:#1c1e22;
  --muted:#6e7079;
  --muted-2:#9a9ca3;
  --line:#e3e2dd;
  --line-2:#d1d0ca;
  --accent:#1d4ed8;          /* cobalt blue */
  --accent-2:#2563eb;
  --accent-soft:rgba(29,78,216,.08);
  --lime:#c4ff3a;            /* electric accent for completion */
  --lime-dark:#9bcc1f;
  --warn:#ef4444;
  --shadow: 0 1px 0 rgba(0,0,0,.02), 0 10px 30px -14px rgba(14,15,18,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:var(--bg);color:var(--ink);
  font-family:'Inter',sans-serif;
  font-feature-settings:'ss01','cv11','cv02';
  -webkit-font-smoothing:antialiased;
  letter-spacing:-.005em;
}

.wrap{max-width:1040px;margin:0 auto;padding:28px 32px 60px;position:relative}

/* ═══════════════════════════════════════════════
   HEADER — compact, clock prominent
   ═══════════════════════════════════════════════ */
.head{
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:24px;
  padding:16px 20px;
  background:var(--paper);
  border-radius:16px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.head-left{display:flex;align-items:center;gap:14px}
.head-logo{
  width:38px;height:38px;border-radius:10px;background:var(--ink);
  display:flex;align-items:center;justify-content:center;color:var(--lime);
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;
  position:relative;overflow:hidden;
}
.head-logo::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 30%, rgba(196,255,58,.25), transparent 60%);
}
.head-title{display:flex;flex-direction:column;gap:0}
.head-title-main{
  font-family:'Inter',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.02em;
  line-height:1.15;
}
.head-title-sub{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
  letter-spacing:.05em;line-height:1.2;
}
.head-date{
  text-align:center;display:flex;flex-direction:column;gap:2px;
}
.head-date-num{
  font-family:'Inter',sans-serif;font-weight:600;font-size:18px;letter-spacing:-.01em;
  line-height:1.1;
}
.head-date-day{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
  letter-spacing:.06em;text-transform:lowercase;
}
.head-clock{
  display:flex;align-items:center;gap:14px;
}
.head-clock-num{
  font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:600;
  letter-spacing:-.04em;color:var(--ink);line-height:1;
  font-variant-numeric:tabular-nums;
}
.head-clock-num .sec{color:var(--accent);font-size:42px}
.pencil-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--line-2);
  background:var(--paper);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .25s;color:var(--ink-2);
}
.pencil-btn:hover{border-color:var(--ink);background:var(--ink);color:var(--paper)}
.pencil-btn.on{background:var(--ink);border-color:var(--ink);color:var(--lime)}
.pencil-btn svg{width:16px;height:16px}

/* ═══════════════════════════════════════════════
   QUOTE — bigger, hero card
   ═══════════════════════════════════════════════ */
.quote{
  margin-top:14px;
  padding:38px 44px;
  background:var(--ink);
  color:var(--paper);
  border-radius:18px;
  position:relative;overflow:hidden;
  display:grid;grid-template-columns:1fr auto;gap:28px;align-items:end;
}
.quote::before{
  content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;
  background:radial-gradient(circle, rgba(196,255,58,.2), transparent 70%);
  pointer-events:none;
}
.quote::after{
  content:'"';position:absolute;left:24px;top:-8px;
  font-family:'Inter',sans-serif;font-weight:900;font-size:140px;line-height:1;
  color:var(--lime);opacity:.18;font-style:italic;pointer-events:none;
}
.quote-text{
  font-family:'Inter',sans-serif;font-weight:400;font-size:30px;line-height:1.3;
  letter-spacing:-.02em;font-style:italic;
  position:relative;z-index:1;
}
.quote-byline{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--lime);
  text-align:right;white-space:nowrap;
  display:flex;flex-direction:column;gap:4px;
  position:relative;z-index:1;
  padding-bottom:4px;
}
.quote-byline::before{
  content:'—';display:block;color:var(--lime);opacity:.6;font-size:14px;letter-spacing:0;
}

/* ═══════════════════════════════════════════════
   PROGRESS — pill with segments
   ═══════════════════════════════════════════════ */
.progress{
  margin-top:14px;
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 20px;
  display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;
  box-shadow:var(--shadow);
}
.progress-label{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.15em;
  color:var(--muted);text-transform:uppercase;font-weight:500;
}
.progress-segments{
  display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:6px;
}
.seg{
  height:8px;background:var(--line);border-radius:99px;transition:all .5s cubic-bezier(.2,.8,.2,1);
  position:relative;overflow:hidden;
}
.seg.active{background:var(--ink)}
.seg.active::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  animation:shimmer 2s linear infinite;
}
@keyframes shimmer{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}
.seg.done{background:var(--lime)}
.progress-num{
  font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;
  color:var(--ink);letter-spacing:-.01em;
  font-variant-numeric:tabular-nums;
}
.progress-num .tot{color:var(--muted);font-weight:400}

/* ═══════════════════════════════════════════════
   BLOCKS
   ═══════════════════════════════════════════════ */
.blocks{margin-top:16px;display:flex;flex-direction:column;gap:14px}

.block{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:18px;
  padding:24px 28px 20px;
  box-shadow:var(--shadow);
  position:relative;
  transition:all .4s cubic-bezier(.2,.8,.2,1);
  overflow:hidden;
}
.block.locked{opacity:.4;filter:saturate(.3)}
.block.locked .block-items, .block.locked .additem{pointer-events:none}
.block.active{
  border-color:var(--ink);
  box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 20px 50px -20px rgba(14,15,18,.3);
}
.block.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ink);
}
.block.complete{
  border-color:var(--lime-dark);
  background:linear-gradient(135deg, rgba(196,255,58,.08), var(--paper) 40%);
}
.block.complete::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--lime);
}

.block-head{
  display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;
  padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:16px;
}
.block-num{
  width:40px;height:40px;border-radius:12px;
  background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;
  letter-spacing:-.01em;
  border:1px solid rgba(29,78,216,.15);
}
.block.complete .block-num{
  background:var(--lime);color:var(--ink);border-color:var(--lime-dark);
}
.block.locked .block-num{
  background:var(--line);color:var(--muted);border-color:var(--line-2);
}
.block-name{
  font-family:'Inter',sans-serif;font-size:22px;line-height:1.15;font-weight:600;
  letter-spacing:-.02em;color:var(--ink);
}
.block-count{
  font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;
  color:var(--ink);letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;
  display:flex;align-items:baseline;gap:2px;
}
.block-count .sl{color:var(--muted-2);font-weight:400;margin:0 3px}
.block-count .tot{color:var(--muted);font-weight:400;font-size:14px}
.block.complete .block-count{color:var(--lime-dark)}

/* ─── Items ─── */
.block-items{display:flex;flex-direction:column;gap:0}
.item{
  display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
  padding:11px 8px;border-radius:8px;cursor:pointer;
  transition:all .2s;
}
.item:hover{background:rgba(14,15,18,.025)}
.cbox{
  width:22px;height:22px;border:2px solid var(--ink-2);border-radius:7px;
  position:relative;flex-shrink:0;transition:all .3s cubic-bezier(.2,1.2,.4,1);
  background:transparent;
}
.cbox::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml;utf8,<svg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' stroke='%230e0f12' stroke-width='3.2' fill='none' stroke-linecap='round' stroke-linejoin='round'><polyline points='4 12 10 18 20 6'/></svg>") center/15px no-repeat;
  opacity:0;transform:scale(.4);transition:all .35s cubic-bezier(.2,1.6,.4,1);
}
.item.checked .cbox{background:var(--lime);border-color:var(--lime-dark);transform:scale(.92)}
.item.checked .cbox::after{opacity:1;transform:scale(1)}
.item.checked .item-text{color:var(--muted)}
.item.checked .item-text b{color:var(--ink-2)}
.item-text{
  font-family:'Inter',sans-serif;font-size:15px;line-height:1.4;font-weight:400;
  color:var(--ink-2);transition:color .25s;letter-spacing:-.005em;
}
.item-text b{font-weight:600;color:var(--ink)}

.item-del{
  width:26px;height:26px;border-radius:7px;border:1px solid var(--line-2);
  background:var(--paper);cursor:pointer;display:none;align-items:center;justify-content:center;
  color:var(--muted);transition:all .2s;flex-shrink:0;
}
.item-del:hover{border-color:var(--warn);color:var(--warn);background:rgba(239,68,68,.06)}
.item-del svg{width:12px;height:12px}
body.editing .item-del{display:flex}
body.editing .item{cursor:default}
body.editing .item .cbox{opacity:.4}

.additem{display:none;margin-top:10px}
body.editing .additem{display:flex;gap:8px;align-items:center}
.additem-input{
  flex:1;font:inherit;font-size:14px;font-family:'Inter',sans-serif;
  background:var(--bg);border:1px solid var(--line);border-radius:8px;
  padding:9px 12px;color:var(--ink-2);outline:none;transition:border .2s;
}
.additem-input:focus{border-color:var(--ink)}
.additem-input::placeholder{color:var(--muted-2)}
.additem-btn{
  background:var(--ink);color:var(--lime);border:none;
  padding:9px 16px;border-radius:8px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.05em;
  transition:all .2s;text-transform:uppercase;
}
.additem-btn:hover{background:var(--accent);color:var(--paper)}

/* ─── Confirm row ─── */
.confirm{
  margin-top:18px;padding-top:14px;border-top:1px solid var(--line);
  display:flex;justify-content:flex-end;align-items:center;gap:12px;
}
.cbtn{
  background:var(--ink);color:var(--paper);border:none;
  padding:13px 22px;border-radius:10px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:-.01em;
  transition:all .25s;
  display:inline-flex;align-items:center;gap:10px;
}
.cbtn:hover:not(:disabled){background:var(--accent);transform:translateY(-1px)}
.cbtn:disabled{background:transparent;color:var(--muted-2);cursor:not-allowed;border:1px dashed var(--line-2)}
.cbtn.done{background:var(--lime);color:var(--ink);cursor:default}
.cbtn .arr{font-size:14px;font-weight:500}

/* ═══════════════════════════════════════════════
   FINISH OVERLAY
   ═══════════════════════════════════════════════ */
.finish-overlay{
  position:fixed;inset:0;background:rgba(14,15,18,.95);z-index:300;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
}
.finish-overlay.show{display:flex;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.finish-card{
  text-align:center;max-width:680px;padding:48px;position:relative;color:var(--paper);
  animation:fadeUp .9s cubic-bezier(.2,.8,.2,1);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
.finish-card .seal{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--lime);color:var(--ink);
  padding:8px 16px;border-radius:99px;
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.15em;
  text-transform:uppercase;font-weight:700;margin-bottom:32px;
}
.finish-card h2{
  font-family:'Inter',sans-serif;font-weight:800;font-size:96px;line-height:.95;
  letter-spacing:-.04em;margin-bottom:18px;
}
.finish-card h2 em{
  font-style:normal;color:var(--lime);
  font-weight:300;font-family:'Inter',sans-serif;
}
.finish-card .sub{
  font-family:'Inter',sans-serif;font-size:20px;color:var(--muted-2);
  margin-bottom:36px;line-height:1.45;font-weight:400;
}
.finish-card .stamp{
  display:inline-block;
  font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.15em;
  color:var(--muted-2);margin-top:24px;
  padding:10px 18px;border:1px solid rgba(255,255,255,.1);border-radius:99px;
}

/* ═══════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════ */
.foot{
  margin-top:18px;padding-top:14px;
  display:flex;justify-content:flex-end;align-items:center;
}
.foot-reset{
  background:transparent;border:none;color:var(--muted);cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;
  padding:6px 10px;border-radius:6px;text-transform:uppercase;
  transition:all .2s;
}
.foot-reset:hover{color:var(--warn);background:rgba(239,68,68,.05)}

/* ═══════════════════════════════════════════════
   FIREWORKS
   ═══════════════════════════════════════════════ */
.fx-layer{position:fixed;inset:0;pointer-events:none;z-index:400;overflow:hidden}
.spark{
  position:absolute;width:7px;height:7px;border-radius:50%;
  pointer-events:none;will-change:transform,opacity;
}
@keyframes burst{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}
}
.ripple{
  position:absolute;border:2px solid var(--lime);border-radius:50%;
  width:24px;height:24px;animation:ripple .9s ease-out forwards;
  pointer-events:none;
}
@keyframes ripple{
  0%{transform:scale(0);opacity:.9}
  100%{transform:scale(12);opacity:0}
}

/* ═══════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════ */
.modal{
  position:fixed;inset:0;background:rgba(14,15,18,.55);z-index:200;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.modal.show{display:flex;animation:fadeIn .25s}
.modal-card{
  background:var(--paper);padding:32px 36px;border-radius:18px;max-width:480px;
  border:1px solid var(--line);box-shadow: 0 40px 100px rgba(14,15,18,.4);
}
.modal-card h4{
  font-family:'Inter',sans-serif;font-weight:700;font-size:24px;letter-spacing:-.02em;
  margin-bottom:10px;
}
.modal-card p{
  font-family:'Inter',sans-serif;font-size:14px;color:var(--muted);line-height:1.55;
  margin-bottom:22px;
}
.modal-act{display:flex;gap:10px;justify-content:flex-end}
.tbtn{
  background:transparent;color:var(--ink);border:1px solid var(--line);
  padding:11px 18px;border-radius:8px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  transition:all .2s;
}
.tbtn:hover{border-color:var(--ink)}

</style>
</head>
<body>

<div class="wrap">

  <!-- ═══ HEADER ═══ -->
  <header class="head">
    <div class="head-left">
      <div class="head-logo">M</div>

    <div class="head-clock">
      <div class="head-clock-num" id="hClock">—<span class="sec" id="hSec"></span></div>
      <button class="pencil-btn" id="btnEdit" title="Редактировать">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ═══ QUOTE ═══ -->
  <aside class="quote">
    <div class="quote-text" id="quoteText">—</div>
    <div class="quote-byline" id="quoteAuthor">—</div>
  </aside>

  <!-- ═══ BLOCKS ═══ -->
  <main class="blocks" id="blocks"></main>

  <footer class="foot">
    <button class="foot-reset" id="btnResetAll">очистить</button>
  </footer>

</div>

<div class="fx-layer" id="fx"></div>

<!-- ═══ FINISH OVERLAY ═══ -->
<div class="finish-overlay" id="finishOverlay">

</div>

<div class="modal" id="modalReset">

    <div class="modal-act">
      <button class="tbtn" onclick="closeModal('modalReset')">Отмена</button>
      <button class="cbtn" onclick="resetAll()">Очистить</button>
    </div>
  </div>
</div>

/* ════════════════════════════════════════════════
   STORAGE
   ════════════════════════════════════════════════ */
const BLOCKS_KEY = 'morn_v5_blocks';
const STATE_KEY  = 'morn_v5_state';

let blocksData = loadBlocks();
let state = loadState();
let editing = false;

function loadBlocks(){
  try{
    const raw = localStorage.getItem(BLOCKS_KEY);
    if(raw){
      const saved = JSON.parse(raw);
      if(Array.isArray(saved) && saved.length===DEFAULT_BLOCKS.length) return saved;
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
}
function saveBlocks(){ localStorage.setItem(BLOCKS_KEY, JSON.stringify(blocksData)); }

function loadState(){
  try{
    const raw = localStorage.getItem(STATE_KEY);
    if(raw){
      const s = JSON.parse(raw);
      blocksData.forEach(b=>{
        if(!s[b.id]) s[b.id] = { confirmed:false, items:{} };
        b.items.forEach(it=>{
          if(s[b.id].items[it.id]===undefined) s[b.id].items[it.id]=false;
        });
      });
      return s;
    }
  }catch(e){}
  return blankState();
}
function blankState(){
  const s = {};
  blocksData.forEach(b=>{
    s[b.id] = { confirmed:false, items:{} };
    b.items.forEach(it=>{ s[b.id].items[it.id]=false });
  });
  return s;
}
function saveState(){ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

/* ════════════════════════════════════════════════
   QUOTE
   ════════════════════════════════════════════════ */
function pickQuote(){
  const today = new Date();
  const dayNum = Math.floor(today.getTime()/(1000*60*60*24));
  const q = QUOTES[dayNum % QUOTES.length];
  document.getElementById('quoteText').textContent = q.t;
  document.getElementById('quoteAuthor').textContent = q.a;
}

/* ════════════════════════════════════════════════
   CLOCK + DATE
   ════════════════════════════════════════════════ */
function tickClock(){
  const n = new Date();
  const pad=v=>String(v).padStart(2,'0');
  document.getElementById('hClock').innerHTML =
    pad(n.getHours())+':'+pad(n.getMinutes())+'<span class="sec">:'+pad(n.getSeconds())+'</span>';
}
function renderDate(){
  const n = new Date();
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const weekdays = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  document.getElementById('hDay').textContent = weekdays[n.getDay()];
  document.getElementById('hDate').textContent = n.getDate()+' '+months[n.getMonth()];
  document.getElementById('hYear').textContent = n.getFullYear();
}

/* ════════════════════════════════════════════════
   PROGRESS
   ════════════════════════════════════════════════ */
function renderProgress(){
  const done = blocksData.filter(b=>state[b.id].confirmed).length;
  const total = blocksData.length;
  const activeId = (()=>{
    for(const b of blocksData){ if(!state[b.id].confirmed) return b.id; }
    return null;
  })();
  const seg = document.getElementById('progSeg');
  seg.innerHTML = blocksData.map(b=>{
    if(state[b.id].confirmed) return '<div class="seg done"></div>';
    if(b.id===activeId) return '<div class="seg active"></div>';
    return '<div class="seg"></div>';
  }).join('');
  document.getElementById('progNum').innerHTML = `${done}<span class="tot">/${total}</span>`;
}

function isBlockActive(id){
  for(const b of blocksData){
    if(!state[b.id].confirmed) return b.id===id;
  }
  return false;
}
function isBlockUnlocked(id){
  for(const b of blocksData){
    if(b.id===id) return true;
    if(!state[b.id].confirmed) return false;
  }
  return false;
}

/* ════════════════════════════════════════════════
   BLOCKS RENDER
   ════════════════════════════════════════════════ */
function renderBlocks(){
  const el = document.getElementById('blocks');
  el.innerHTML = blocksData.map((b,i)=>{
    const s = state[b.id];
    const checkedCount = Object.values(s.items).filter(v=>v).length;
    const total = b.items.length;
    const allChecked = total>0 && checkedCount === total;
    const unlocked = isBlockUnlocked(b.id);
    const active = isBlockActive(b.id);
    let cls = 'block';
    if(s.confirmed) cls += ' complete';
    else if(active) cls += ' active';
    if(!unlocked && !s.confirmed) cls += ' locked';

    const itemsHTML = b.items.map(it=>{
      const checked = s.items[it.id];
      return `<div class="item ${checked?'checked':''}" data-block="${b.id}" data-item="${it.id}">
        <div class="cbox"></div>
        <div class="item-text">${it.html}</div>
        <button class="item-del" data-del-block="${b.id}" data-del-item="${it.id}" title="Удалить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('');

    const confirmDisabled = !allChecked || s.confirmed;
    const confirmTxt = s.confirmed ? 'Зафиксировано' : (allChecked ? 'Подтвердить' : 'Отметь все пункты');
    const confirmCls = s.confirmed ? 'cbtn done' : 'cbtn';
    const arrow = s.confirmed ? '✓' : (allChecked ? '→' : '');
    const numLabel = String(i+1).padStart(2,'0');

    return `<section class="${cls}" data-block-root="${b.id}">
      <div class="block-head">
        <div class="block-num">${numLabel}</div>
        <div class="block-name">${b.name}</div>
        <div class="block-count">${checkedCount}<span class="sl">/</span><span class="tot">${total}</span></div>
      </div>
      <div class="block-items">${itemsHTML}</div>
      <div class="additem">
        <input class="additem-input" placeholder="новый пункт…" data-add-block="${b.id}" />
        <button class="additem-btn" data-add-btn="${b.id}">Добавить</button>
      </div>
      <div class="confirm">
        <button class="${confirmCls}" ${confirmDisabled?'disabled':''} data-confirm="${b.id}">${confirmTxt}${arrow?`<span class="arr">${arrow}</span>`:''}</button>
      </div>
    </section>`;
  }).join('');

  // wire items
  el.querySelectorAll('.item').forEach(node=>{
    node.onclick = (e)=>{
      if(editing) return;
      if(e.target.closest('.item-del')) return;
      const bid = node.dataset.block;
      const iid = node.dataset.item;
      if(!isBlockUnlocked(bid) || state[bid].confirmed) return;
      state[bid].items[iid] = !state[bid].items[iid];
      saveState();
      if(state[bid].items[iid]){
        const rect = node.querySelector('.cbox').getBoundingClientRect();
        sparkAt(rect.left+rect.width/2, rect.top+rect.height/2, 'small');
      }
      renderAll();
    };
  });
  // delete
  el.querySelectorAll('[data-del-block]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const bid = btn.dataset.delBlock;
      const iid = btn.dataset.delItem;
      const b = blocksData.find(x=>x.id===bid);
      b.items = b.items.filter(x=>x.id!==iid);
      delete state[bid].items[iid];
      saveBlocks();saveState();
      renderAll();
    };
  });
  // add
  el.querySelectorAll('[data-add-btn]').forEach(btn=>{
    btn.onclick = ()=>{
      const bid = btn.dataset.addBtn;
      const input = el.querySelector(`[data-add-block="${bid}"]`);
      const val = input.value.trim();
      if(!val) return;
      const b = blocksData.find(x=>x.id===bid);
      const newId = bid+'_c'+Date.now();
      b.items.push({ id:newId, html: escapeHtml(val) });
      state[bid].items[newId] = false;
      saveBlocks();saveState();
      input.value = '';
      renderAll();
      setTimeout(()=>{
        const newInput = document.querySelector(`[data-add-block="${bid}"]`);
        if(newInput) newInput.focus();
      }, 50);
    };
  });
  el.querySelectorAll('[data-add-block]').forEach(inp=>{
    inp.onkeydown = (e)=>{
      if(e.key==='Enter'){
        const bid = inp.dataset.addBlock;
        el.querySelector(`[data-add-btn="${bid}"]`).click();
      }
    };
  });
  // confirm
  el.querySelectorAll('[data-confirm]').forEach(btn=>{
    btn.onclick = ()=>{
      const bid = btn.dataset.confirm;
      state[bid].confirmed = true;
      saveState();
      const rect = btn.getBoundingClientRect();
      sparkAt(rect.left+rect.width/2, rect.top+rect.height/2, 'big');
      setTimeout(()=>{
        const idx = blocksData.findIndex(b=>b.id===bid);
        const next = blocksData[idx+1];
        if(next){
          const elN = document.querySelector(`[data-block-root="${next.id}"]`);
          if(elN) elN.scrollIntoView({behavior:'smooth',block:'start'});
        } else {
          finishCycle();
        }
      }, 400);
      renderAll();
    };
  });
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ════════════════════════════════════════════════
   EDIT MODE
   ════════════════════════════════════════════════ */
document.getElementById('btnEdit').onclick = ()=>{
  editing = !editing;
  document.body.classList.toggle('editing', editing);
  document.getElementById('btnEdit').classList.toggle('on', editing);
};

/* ════════════════════════════════════════════════
   FIREWORKS
   ════════════════════════════════════════════════ */
const COLORS = ['#c4ff3a','#1d4ed8','#9bcc1f','#0e0f12','#2563eb','#ffffff'];
function sparkAt(x,y,size){
  const layer = document.getElementById('fx');
  const count = size==='big' ? 44 : 16;
  if(size==='big' || size==='huge'){
    const r = document.createElement('div');
    r.className='ripple';
    r.style.left = (x-12)+'px';
    r.style.top = (y-12)+'px';
    layer.appendChild(r);
    setTimeout(()=>r.remove(), 1000);
  }
  const c = size==='huge' ? 64 : count;
  for(let i=0;i<c;i++){
    const s = document.createElement('div');
    s.className='spark';
    const ang = (Math.PI*2)*(i/c) + Math.random()*0.5;
    const dist = size==='huge' ? 150+Math.random()*200 : (size==='big' ? 95+Math.random()*140 : 38+Math.random()*48);
    const dx = Math.cos(ang)*dist;
    const dy = Math.sin(ang)*dist - (size==='huge'?32:(size==='big'?22:8));
    s.style.left = x+'px';
    s.style.top = y+'px';
    s.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
    s.style.setProperty('--dx', dx+'px');
    s.style.setProperty('--dy', dy+'px');
    const dur = size==='huge' ? (950+Math.random()*600) : (size==='big' ? (700+Math.random()*500) : (450+Math.random()*250));
    s.style.animation = `burst ${dur}ms cubic-bezier(.1,.6,.3,1) forwards`;
    if((size==='big'||size==='huge') && Math.random()<.4){ s.style.width='10px'; s.style.height='10px' }
    layer.appendChild(s);
    setTimeout(()=>s.remove(), dur+50);
  }
}

function grandFinale(){
  const w = window.innerWidth;
  const h = window.innerHeight;
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const x = 60+Math.random()*(w-120);
      const y = 80+Math.random()*(h*0.75);
      sparkAt(x, y, Math.random()<.5 ? 'big' : 'huge');
    }, i*200);
  }
  setTimeout(()=>{
    sparkAt(w/2, h/2, 'huge');
    sparkAt(w/2 - 180, h/2 - 80, 'big');
    sparkAt(w/2 + 180, h/2 - 80, 'big');
  }, 14*200 + 100);
}

/* ════════════════════════════════════════════════
   FINISH
   ════════════════════════════════════════════════ */
function finishCycle(){
  const overlay = document.getElementById('finishOverlay');
  const n = new Date();
  const pad=v=>String(v).padStart(2,'0');
  const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  document.getElementById('finishStamp').textContent =
    `${n.getDate()} ${months[n.getMonth()]} · ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  overlay.classList.add('show');
  grandFinale();
  setTimeout(()=>{
    state = blankState();
    saveState();
    renderAll();
  }, 500);
  setTimeout(()=>{
    overlay.classList.remove('show');
    window.scrollTo({top:0,behavior:'smooth'});
  }, 6500);
}

/* ════════════════════════════════════════════════
   RESET
   ════════════════════════════════════════════════ */
function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
window.closeModal = closeModal;

document.getElementById('btnResetAll').onclick = ()=>openModal('modalReset');
function resetAll(){
  closeModal('modalReset');
  localStorage.removeItem(STATE_KEY);
  localStorage.removeItem(BLOCKS_KEY);
  blocksData = JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
  state = blankState();
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}
window.resetAll = resetAll;

/* ════════════════════════════════════════════════
   MAIN
   ════════════════════════════════════════════════ */
function renderAll(){
  renderBlocks();
}
function init(){
  pickQuote();
  renderDate();
  renderAll();
  setInterval(()=>{ tickClock(); }, 1000);
  setInterval(()=>{ renderDate(); pickQuote(); }, 60000);
  tickClock();
}
init();
</script>
